<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni Daily Check</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.4em;
            color: #fff;
            font-weight: 600;
        }
        .header .date {
            color: #888;
            font-size: 0.9em;
            margin-top: 4px;
        }
        .header .mode {
            display: inline-block;
            background: #1a3a2a;
            color: #4ade80;
            font-size: 0.75em;
            padding: 3px 10px;
            border-radius: 12px;
            margin-top: 8px;
            font-weight: 500;
        }
        .header .mode.deep {
            background: #1a2a3a;
            color: #60a5fa;
        }
        .section {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #2a2a2a;
        }
        .section h2 {
            font-size: 1em;
            color: #fff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section h2 .icon {
            font-size: 1.2em;
        }
        .day-block {
            background: #222;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .day-block:last-child { margin-bottom: 0; }
        .day-block h3 {
            font-size: 0.9em;
            color: #60a5fa;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .day-block.today h3 {
            color: #4ade80;
        }
        .day-block.today {
            border-left: 3px solid #4ade80;
        }
        .item {
            padding: 6px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.9em;
        }
        .item:last-child { border-bottom: none; }
        .item .course {
            color: #888;
            font-size: 0.8em;
        }
        .item .title {
            color: #e0e0e0;
            font-weight: 500;
        }
        .item .detail {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 2px;
        }
        .deadline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .deadline:last-child { border-bottom: none; }
        .deadline .info { flex: 1; }
        .deadline .due {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: 500;
            white-space: nowrap;
            margin-left: 8px;
        }
        .due.urgent {
            background: #3a1a1a;
            color: #f87171;
        }
        .due.soon {
            background: #3a2a1a;
            color: #fbbf24;
        }
        .due.later {
            background: #1a2a1a;
            color: #4ade80;
        }
        .points {
            font-size: 0.75em;
            color: #888;
        }
        .hint {
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.9em;
        }
        .hint:last-child { border-bottom: none; }
        .hint strong { color: #fbbf24; }
        .announcement {
            padding: 8px 0;
            font-size: 0.9em;
        }
        .announcement .from {
            color: #888;
            font-size: 0.8em;
        }
        .updated {
            text-align: center;
            color: #555;
            font-size: 0.75em;
            padding: 16px 0;
        }
        .empty {
            color: #666;
            font-style: italic;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Uni Daily Check</h1>
        <div class="date" id="date">Wird geladen...</div>
        <div class="mode" id="mode">Tages-Check</div>
    </div>

    <div id="content">
        <div class="section">
            <p class="empty">Noch kein Check generiert. Der erste Check kommt morgen um 9:00 Uhr.</p>
        </div>
    </div>

    <div class="updated" id="updated"></div>
</body>
</html>
